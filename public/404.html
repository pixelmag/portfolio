<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // SPA redirect for GitHub Pages clean URLs
      // Encodes the current path/query/hash as a query param on the root URL,
      // so the browser loads index.html which then restores the original path.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + 1).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
</html>
